<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>부반장 후보 조우찬</title>

<style>
body {
  margin: 0;
  background: #EDEDED;
  color: #111;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.section {
  padding: 120px 80px;
  max-width: 900px;
}

/* 타이포 */
h1 {
  font-size: 64px;
  line-height: 1.2;
  margin-bottom: 20px;
}

.desc {
  color: #555;
  font-size: 18px;
  margin-bottom: 40px;
}

/* 버튼 */
.btn {
  padding: 14px 28px;
  background: #111;
  color: white;
  border: none;
  border-radius: 999px;
  font-weight: bold;
  cursor: pointer;
}

/* 이미지 */
.main-img {
  width: 100%;
  max-width: 700px;
  margin-top: 40px;
  border-radius: 10px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

/* before-after */
.compare {
  display: flex;
  align-items: center;
  gap: 30px;
  margin-top: 50px;
  flex-wrap: wrap;
}

.box {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 100%;
  max-width: 320px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.box img {
  width: 100%;
  border-radius: 6px;
}

.label {
  font-size: 12px;
  font-weight: bold;
  margin-bottom: 10px;
}

.before { color: #888; }
.after { color: #6366f1; }

.arrow {
  font-size: 28px;
  color: #999;
}

/* 모바일 대응 */
@media (max-width: 768px) {
  .section {
    padding: 80px 20px;
  }

  h1 {
    font-size: 40px;
  }

  .compare {
    flex-direction: column;
  }

  .arrow {
    transform: rotate(90deg);
  }
}
</style>
</head>

<body>

<!-- 1. 메인 -->
<div class="section">
  <h1>이미<br>실천하고 있습니다</h1>
  <div class="desc">
    책임감 있게 끝까지 하겠습니다.<br>정답은 조우찬.
  </div>
</div>

<!-- 2. 해설지 -->
<div class="section">
  <h1>해설지,<br>이미 실천하고 있습니다</h1>
  <div class="desc">
    1학기 때 직접 만든 자료 일부.
  </div>

  <img src="공강.png" class="main-img">

    <button class="btn">전체 보기</button>
  </a>
</div>

<!-- 3. 변형문제 -->
<div class="section">
  <h1>문제,<br>이렇게 바꾼다</h1>

  <div class="desc">
    시험 대비용 변형 문제.
  </div>

<div class="compare">
  <div class="box">
    <div class="label before">BEFORE</div>
    <img src="before.png">
  </div>

  <div class="arrow">→</div>

  <div class="box">
    <div class="label after">AFTER</div>
    <img src="after.png">
  </div>
</div>

</body>
</html>
